services:
  nginx:
    image: nginx:alpine
    ports:
      - "5686:5686"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      mail-it:
        condition: service_healthy
    restart: unless-stopped

  mail-it:
    image: ghcr.io/victorhachard/mail-it:${IMAGE_TAG:-latest}
    build: .
    expose:
      - "5686"
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5686/health"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 60s

  mail-it-dev:
    build:
      context: .
      target: build
    profiles: ["dev"]
    ports:
      - "5686:5686"
    volumes:
      - .:/workspace
      - m2_cache:/root/.m2
    working_dir: /workspace
    env_file: .env
    command:
      - mvn
      - "spring-boot:run"
      - "-Dspring-boot.run.jvmArguments=-Dspring.devtools.restart.enabled=true"
    restart: "no"

volumes:
  m2_cache:
